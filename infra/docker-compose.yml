services:
  postgres:
    image: postgres:15
    container_name: content_management_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: content_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: content_management_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
